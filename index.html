<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meesho Offline Hub v2.6</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --meesho-purple: #82004f;
            --meesho-light: #a31569;
            --success-green: #2e7d32;
            --border-color: #e0e0e0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: #f0f2f5; 
            padding: 10px; 
            margin: 0; 
            display: flex;
            justify-content: center;
        }

        .app-card { 
            width: 100%;
            max-width: 500px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.12); 
            overflow: hidden; 
            margin-top: 5px;
            margin-bottom: 20px;
            border: 1px solid #eaeaea;
        }

        .header { 
            background: linear-gradient(135deg, var(--meesho-purple), var(--meesho-light)); 
            color: white; 
            padding: 18px; 
            text-align: center; 
        }
        .header h2 { margin: 0; font-size: 20px; letter-spacing: 0.5px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .v2-badge { background: #ffc107; color: #000; font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 12px; letter-spacing: 1px;}

        .upload-section { background: #fff5fa; padding: 15px; text-align: center; border-bottom: 1px solid #ffdaed; }
        .upload-section label { font-weight: bold; color: var(--meesho-purple); display: block; margin-bottom: 10px; font-size: 13px; }
        input[type="file"] { font-size: 12px; width: 100%; }

        .status-badge { display: inline-block; margin-top: 10px; padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #eee; color: #555; }
        .status-success { background: #e8f5e9; color: var(--success-green); border: 1px solid #a5d6a7; }

        #reader-container { background: #000; display: none; position: relative; border-radius: 8px; margin: 10px; overflow: hidden;}
        #reader { width: 100%; }
        .close-cam { width: 100%; background: #333; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; font-size: 12px; text-transform: uppercase; }

        .content { padding: 15px; }
        .field-group { margin-bottom: 20px; }
        .field-group label { display: block; font-size: 11px; font-weight: 800; color: #777; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        input[type="text"], select, textarea { flex: 1; padding: 12px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; font-family: 'Courier New', monospace; background: #fafafa; transition: all 0.3s ease; width: 100%; box-sizing: border-box; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--meesho-purple); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(130, 0, 79, 0.1);}
        textarea { font-family: 'Segoe UI', sans-serif; font-size: 13px; resize: vertical; min-height: 120px; }

        .btn-row { display: flex; gap: 8px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; transition: transform 0.1s, opacity 0.2s, background 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        button:active { transform: scale(0.96); opacity: 0.9; }

        .btn-scan { background: var(--meesho-purple); color: white; box-shadow: 0 4px 10px rgba(130, 0, 79, 0.2); }
        .btn-scan:hover { background: var(--meesho-light); }
        .btn-copy { background: #fce4ec; color: var(--meesho-purple); border: 1px solid var(--meesho-purple); }
        .btn-copy-sub { background: #e8f5e9; color: var(--success-green); border: 1px solid var(--success-green); width: 100%; }
        .btn-media { background: #fff; border: 2px solid var(--border-color); color: #555; }
        .btn-media:hover { border-color: var(--meesho-purple); color: var(--meesho-purple); }
        
        .radio-group { display: flex; gap: 15px; margin-bottom: 10px; flex-wrap: wrap;}
        .radio-group label { display: flex; align-items: center; gap: 5px; font-size: 14px; color: #333; font-weight: bold; cursor: pointer; }

        .clear-btn { width: 100%; background: transparent; color: #999; margin-top: 20px; border: 1px dashed #ccc; font-size: 12px; padding: 15px; border-radius: 10px; cursor: pointer;}
        .clear-btn:hover { background: #fafafa; color: #555; }

        .ai-dashboard { background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-top: 10px; }
        .ai-stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box { flex: 1; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .stat-box h3 { margin: 0; font-size: 20px; color: var(--meesho-purple); }
        .stat-box p { margin: 4px 0 0; font-size: 10px; color: #777; font-weight: bold; text-transform: uppercase; }
        .history-list { max-height: 150px; overflow-y: auto; font-size: 11px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 5px; }
        .history-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;}
        .history-item:last-child { border-bottom: none; }
        .btn-log { background: #2196F3; color: white; width: 100%; margin-bottom: 10px; }
        .btn-log:hover { background: #1976D2; }

        #btn-push-meesho { width: 100%; margin-top: 10px; padding: 16px; background: #2e7d32; color: white; border-radius: 10px; font-weight: 900; font-size: 14px; border: none; box-shadow: 0 4px 12px rgba(46,125,50,0.3); cursor: pointer; transition: background 0.3s; }
        #btn-push-meesho:hover { background: #1b5e20; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h2>Claim Hub Pro <span class="v2-badge">v2.6 AI</span></h2>
    </div>

    <div class="upload-section">
        <label>📁 UPLOAD RETURNS REPORT (EXCEL/CSV)</label>
        <input type="file" id="excelFile" accept=".csv, .xlsx, .xls">
        <div id="fileStatus" class="status-badge">No file loaded</div>
    </div>

    <div id="reader-container">
        <div id="reader"></div>
        <button type="button" class="close-cam" onclick="stopScanner()">🛑 Close Scanner</button>
    </div>

    <div class="content">
        <div class="field-group">
            <label>1. AWB Number</label>
            <div class="input-row">
                <input type="text" id="awb" placeholder="Scan or Type..." oninput="manualAwbCheck()">
            </div>
            <div class="btn-row">
                <button type="button" class="btn-scan" onclick="startScanner('awb')">📷 SCAN AWB</button>
                <button type="button" class="btn-copy" onclick="copy('awb')">COPY</button>
            </div>
            <div id="duplicateWarning" style="color: #d32f2f; font-size: 11px; font-weight: bold; display: none; margin-top: 8px; background: #ffebee; padding: 8px; border-radius: 6px;">⚠️ AI Alert: Duplicate AWB Logged Today!</div>
        </div>

        <div class="field-group">
            <label>2. Sub-Order ID</label>
            <div class="input-row">
                <input type="text" id="subid" placeholder="Auto-fills from file..." readonly style="background: #f0fdf4;">
            </div>
            <button type="button" class="btn-copy-sub" onclick="copy('subid')">✅ COPY SUB-ORDER ID</button>
        </div>

        <div class="field-group">
            <label>3. Packet ID</label>
            <div class="input-row">
                <input type="text" id="pid" placeholder="Scan or Type..." oninput="generateTicket()">
            </div>
            <div class="btn-row">
                <button type="button" class="btn-scan" onclick="startScanner('pid')" style="background: #444;">📷 SCAN PACKET</button>
                <button type="button" class="btn-copy" onclick="copy('pid')">COPY</button>
            </div>
        </div>

        <div class="field-group" style="border-top: 1px dashed #ccc; padding-top: 20px;">
            <label>4. Capture Proof (Saves to PC)</label>
            
            <div class="btn-row" id="camera-start-buttons">
                <button type="button" class="btn-media" onclick="openLiveCamera('photo')">📸 Start Photo Camera</button>
                <button type="button" class="btn-media" onclick="openLiveCamera('video')">🎥 Start Video Camera (23MB)</button>
            </div>

            <div id="live-media-container" style="display: none; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid #333; margin-top: 10px;">
                <video id="live-media-feed" autoplay playsinline style="width: 100%; display: block; object-fit: cover; max-height: 250px;"></video>
                <div style="padding: 10px; display: flex; gap: 8px; background: #222;">
                    <button type="button" id="btn-capture-photo" style="display: none; background: var(--meesho-purple); color: white;" onclick="captureLivePhoto()">📸 SNAP PHOTO</button>
                    <button type="button" id="btn-start-record" style="display: none; background: #d32f2f; color: white;" onclick="startLiveRecording()">🔴 REC (23MB)</button>
                    <button type="button" id="btn-stop-record" style="display: none; background: #4caf50; color: white;" onclick="stopLiveRecording(false)">⏹️ STOP & SAVE</button>
                    <button type="button" style="background: #555; color: white;" onclick="closeLiveCamera()">❌ CANCEL</button>
                </div>
            </div>

            <div id="mediaStatus" style="font-size: 13px; font-weight: bold; color: #666; margin-top: 8px; text-align: center; background: #eee; padding: 10px; border-radius: 8px;">Ready to capture...</div>
        </div>

        <div class="field-group" style="border-top: 1px dashed #ccc; padding-top: 20px;">
            <label>5. AI Ticket Generator</label>
            
            <div class="radio-group">
                <label><input type="radio" name="returnType" value="RTO" onchange="toggleReason(); generateTicket()"> RTO (Courier Return)</label>
                <label><input type="radio" name="returnType" value="Customer Return" onchange="toggleReason(); generateTicket()"> Customer Return</label>
            </div>

            <div id="reasonContainer" style="display: none; margin-bottom: 10px;">
                <select id="returnReason" onchange="generateTicket()" style="width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; border: 2px solid var(--border-color);">
                    <option value="" disabled selected>Select Customer Return Reason...</option>
                    <option value="I have received wrong return">I have received wrong return</option>
                    <option value="I have received damaged return">I have received damaged return</option>
                    <option value="I have not received my Return/RTO shipment">I have not received my Return/RTO shipment</option>
                    <option value="Item/s are missing in my return">Item/s are missing in my return</option>
                    <option value="I have received a wrong barcoded package in RTO">I have received a wrong barcoded package in RTO</option>
                    <option value="I have received used product as return">I have received used product as return</option>
                    <option value="Return/RTO product not received but marked delivered">Return/RTO product not received but marked delivered - Need Proof of Delivery</option>
                    <option value="Return/RTO Delivery Issue - False Attempt by Logistic Partner">Return/RTO Delivery Issue - False Attempt by Logistic Partner</option>
                    <option value="I have received an RTO in a non-barcoded package">I have received an RTO in a non-barcoded package</option>
                    <option value="Other Returns/RTO and Exchange related issue">Other Returns/RTO and Exchange related issue</option>
                </select>
            </div>

            <textarea id="ticketMessage" placeholder="AI formatted ticket message will appear here..." readonly></textarea>
            
            <button type="button" class="btn-copy" style="width: 100%; margin-top: 10px; padding: 16px; background: #000; color: white; border-radius: 10px;" onclick="copy('ticketMessage')">📝 COPY TICKET TO PASTE IN MEESHO</button>
        </div>

        <div class="field-group" style="border-top: 1px dashed #ccc; padding-top: 20px;">
            <label>6. AI Data Management Hub</label>
            <button type="button" class="btn-log" onclick="logCurrentClaim()">💾 SAVE & CLEAR FOR NEXT</button>
            
            <div class="ai-dashboard">
                <div class="ai-stats">
                    <div class="stat-box"><h3 id="stat-total">0</h3><p>Total Saved</p></div>
                    <div class="stat-box"><h3 id="stat-rto">0</h3><p>Total RTO</p></div>
                    <div class="stat-box"><h3 id="stat-cr">0</h3><p>Total CR</p></div>
                </div>
                <div style="font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px;">Recent Local History:</div>
                <div class="history-list" id="history-container">
                    <div style="padding: 10px; text-align: center; color: #999;">No claims logged yet.</div>
                </div>
                
                <div class="btn-row" style="margin-top: 10px;">
                    <button type="button" style="background: var(--success-green); color: white;" onclick="exportToCSV()">📊 Export CSV</button>
                    <button type="button" style="background: #ffebee; color: #d32f2f; border: 1px solid #ffcdd2;" onclick="clearDatabase()">🗑️ Clear DB</button>
                </div>
            </div>
        </div>

        <button type="button" class="clear-btn" onclick="clearForm()">🗑️ CLEAR FIELDS MANUALLY</button>
    </div>
</div>

<script>
    window.onload = function() {
        updateDashboard(); 
        document.getElementById('awb').focus(); 
    };

    // --- QR AND EXCEL LOGIC ---
    let html5QrCode = null;
    let currentTarget = '';
    let excelData = []; 

    document.getElementById('excelFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            excelData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            const statusBadge = document.getElementById('fileStatus');
            statusBadge.innerText = `✅ Loaded ${excelData.length} Rows`;
            statusBadge.className = "status-badge status-success";
        };
        reader.readAsArrayBuffer(file);
    });

    function findSubOrderId(awbScanned) {
        if (excelData.length === 0) return; 
        const cleanAwb = String(awbScanned).trim().toUpperCase();
        let foundSubId = null;
        for (let r = 0; r < excelData.length; r++) {
            if (excelData[r].join("|||").toUpperCase().includes(cleanAwb)) {
                if (excelData[r].length > 8) {
                    foundSubId = String(excelData[r][8]).trim();
                }
                break; 
            }
        }
        const subIdBox = document.getElementById('subid');
        if (foundSubId && foundSubId !== "undefined" && foundSubId !== "") {
            subIdBox.value = foundSubId;
            subIdBox.style.borderColor = "#4caf50"; 
            subIdBox.style.backgroundColor = "#e8f5e9";
        } else {
            subIdBox.value = "NOT FOUND";
            subIdBox.style.borderColor = "#f44336"; 
            subIdBox.style.backgroundColor = "#ffebee";
        }
        generateTicket(); 
    }

    function manualAwbCheck() { 
        const val = document.getElementById('awb').value.trim();
        findSubOrderId(val);
        checkDuplicate(val); 
        generateTicket();
    }

    async function startScanner(targetField) {
        if (liveMediaStream) {
            liveMediaStream.getTracks().forEach(track => track.stop());
            liveMediaStream = null;
        }
        closeLiveCamera(); 

        currentTarget = targetField;
        document.getElementById('reader-container').style.display = 'block';
        if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();

        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 260, height: 160 } };
        html5QrCode.start(
            { facingMode: "environment" }, config,
            (decodedText) => {
                const text = String(decodedText).trim();
                if (currentTarget === 'awb' && (text.includes('http') || text.includes('{'))) return;
                try { let snd = new Audio('https://www.soundjay.com/buttons/beep-07.mp3'); snd.play().catch(e=>{}); } catch(e){}
                document.getElementById(currentTarget).value = text;
                if (currentTarget === 'awb') {
                    findSubOrderId(text);
                    checkDuplicate(text);
                }
                generateTicket();
                stopScanner();
            }
        ).catch(err => alert("Camera Permission Required for Scanner."));
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { 
                document.getElementById('reader-container').style.display = 'none'; 
            });
        } else {
            document.getElementById('reader-container').style.display = 'none'; 
        }
    }

    function copy(id) {
        const field = document.getElementById(id);
        if(!field.value || field.value.includes("NOT FOUND")) return;
        field.select();
        field.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(field.value);
        const originalBg = field.style.background;
        field.style.background = "#fff9c4";
        setTimeout(() => { field.style.background = originalBg; }, 500);
    }

    // --- CAMERA ENGINE ---
    let liveMediaStream = null;
    let liveMediaRecorder = null;
    let recordedChunks = [];
    let sizeCheckInterval = null;

    async function openLiveCamera(mode) {
        document.getElementById('camera-start-buttons').style.display = 'none';
        document.getElementById('live-media-container').style.display = 'block';
        document.getElementById('mediaStatus').innerText = "Connecting to camera...";
        document.getElementById('mediaStatus').style.background = "#e3f2fd";
        document.getElementById('mediaStatus').style.color = "#1565c0";

        document.getElementById('btn-capture-photo').style.display = mode === 'photo' ? 'block' : 'none';
        document.getElementById('btn-start-record').style.display = mode === 'video' ? 'block' : 'none';
        document.getElementById('btn-stop-record').style.display = 'none';

        try {
            liveMediaStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: mode === 'video' 
            });
            attachStream();
        } catch (err) {
            if(mode === 'video') {
                try {
                    liveMediaStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment" },
                        audio: false 
                    });
                    attachStream();
                } catch (err2) {
                    cameraError();
                }
            } else {
                cameraError();
            }
        }
        
        function attachStream() {
            const videoElement = document.getElementById('live-media-feed');
            videoElement.srcObject = liveMediaStream;
            videoElement.muted = true; 
            document.getElementById('mediaStatus').innerText = "Live camera active. Ready to capture.";
            document.getElementById('mediaStatus').style.background = "#e8f5e9";
            document.getElementById('mediaStatus').style.color = "#2e7d32";
        }
        
        function cameraError() {
            alert("Camera access denied. Please check your browser permissions.");
            closeLiveCamera();
        }
    }

    function closeLiveCamera() {
        if (liveMediaStream) {
            liveMediaStream.getTracks().forEach(track => track.stop());
            liveMediaStream = null;
        }
        if (sizeCheckInterval) clearInterval(sizeCheckInterval);
        if (liveMediaRecorder && liveMediaRecorder.state !== "inactive") {
            liveMediaRecorder.stop();
        }
        document.getElementById('live-media-feed').srcObject = null;
        document.getElementById('live-media-container').style.display = 'none';
        document.getElementById('camera-start-buttons').style.display = 'flex';
        document.getElementById('mediaStatus').innerText = "Ready to capture...";
        document.getElementById('mediaStatus').style.background = "#eee";
        document.getElementById('mediaStatus').style.color = "#666";
    }

    function captureLivePhoto() {
        if (!liveMediaStream) return alert("Camera is not active!");
        
        try {
            let snd = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');
            snd.play().catch(e => {});
        } catch(e) {}

        const video = document.getElementById('live-media-feed');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob((blob) => {
            if(!blob) return alert("Failed to capture photo.");
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const awbVal = document.getElementById('awb').value || "Claim";
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            a.download = `Photo_${awbVal}_${timestamp}.jpg`;
            a.href = url;
            a.target = "_blank";
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            setTimeout(() => { URL.revokeObjectURL(url); }, 2000);
            
            document.getElementById('mediaStatus').innerHTML = `✅ Photo saved to PC!`;
            document.getElementById('mediaStatus').style.background = "#e8f5e9";
            document.getElementById('mediaStatus').style.color = "#2e7d32";
            
            setTimeout(() => {
                if(liveMediaStream) {
                    document.getElementById('mediaStatus').innerText = "Live camera active. Ready to capture.";
                }
            }, 3000);
        }, 'image/jpeg', 0.95);
    }

    function startLiveRecording() {
        if (!liveMediaStream) return alert("Camera is not active!");
        recordedChunks = [];
        
        let options = { mimeType: 'video/mp4' };
        if (!MediaRecorder.isTypeSupported('video/mp4')) {
            options = { mimeType: 'video/webm' };
        }
        
        try {
            liveMediaRecorder = new MediaRecorder(liveMediaStream, options);
        } catch (e) {
            try { liveMediaRecorder = new MediaRecorder(liveMediaStream); } 
            catch (err) { return alert("Video recording not supported."); }
        }

        document.getElementById('btn-capture-photo').style.display = 'none';
        document.getElementById('btn-start-record').style.display = 'none';
        document.getElementById('btn-stop-record').style.display = 'block';
        
        document.getElementById('mediaStatus').innerHTML = `🔴 REC: 0.00 MB / 23.00 MB`;
        document.getElementById('mediaStatus').style.background = "#ffebee";
        document.getElementById('mediaStatus').style.color = "#d32f2f";

        liveMediaRecorder.ondataavailable = function(event) {
            if (event.data.size > 0) {
                recordedChunks.push(event.data);
            }
        };

        liveMediaRecorder.start(250);

        sizeCheckInterval = setInterval(() => {
            const tempBlob = new Blob(recordedChunks);
            const sizeMB = (tempBlob.size / (1024 * 1024)).toFixed(2);
            
            document.getElementById('mediaStatus').innerHTML = `🔴 REC: ${sizeMB} MB / 23.00 MB`;

            if (sizeMB >= 23.00) {
                stopLiveRecording(true);
            }
        }, 250);
    }

    function stopLiveRecording(limitHit = false) {
        if (liveMediaRecorder && liveMediaRecorder.state !== "inactive") {
            liveMediaRecorder.stop();
        }
        clearInterval(sizeCheckInterval);
        
        document.getElementById('btn-capture-photo').style.display = 'none';
        document.getElementById('btn-start-record').style.display = 'block';
        document.getElementById('btn-stop-record').style.display = 'none';
        
        document.getElementById('mediaStatus').innerText = "Processing video...";
        
        setTimeout(() => {
            try {
                let snd = new Audio('https://www.soundjay.com/buttons/beep-07.mp3');
                snd.play().catch(e=>{});
            } catch(e) {}

            const finalBlob = new Blob(recordedChunks, { type: liveMediaRecorder.mimeType || 'video/mp4' });
            const finalSizeMB = (finalBlob.size / (1024 * 1024)).toFixed(2);
            
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            const awbVal = document.getElementById('awb').value || "Claim";
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            
            let ext = "mp4";
            if (finalBlob.type.includes("webm")) ext = "webm";
            
            a.download = `Video_${awbVal}_${timestamp}.${ext}`;
            a.href = url;
            a.target = "_blank";
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            setTimeout(() => { URL.revokeObjectURL(url); }, 3000);
            
            if (limitHit) {
                document.getElementById('mediaStatus').innerHTML = `✅ Saved strictly at 23MB limit. (${finalSizeMB} MB).`;
            } else {
                document.getElementById('mediaStatus').innerHTML = `✅ Video saved to PC (${finalSizeMB} MB).`;
            }
            document.getElementById('mediaStatus').style.background = "#e8f5e9";
            document.getElementById('mediaStatus').style.color = "#2e7d32";
            
            setTimeout(() => {
                if(liveMediaStream) {
                    document.getElementById('mediaStatus').innerText = "Live camera active. Ready to capture.";
                }
            }, 4000);
        }, 500); 
    }

    // --- AI DATA MANAGEMENT ENGINE ---
    let smartDB = JSON.parse(localStorage.getItem('meeshoSmartDB')) || [];

    function checkDuplicate(awbCheck) {
        const isDupe = smartDB.some(item => item.awb === awbCheck && item.awb !== "");
        document.getElementById('duplicateWarning').style.display = isDupe ? 'block' : 'none';
        
        if (isDupe) {
            document.getElementById('awb').style.borderColor = "#d32f2f";
            document.getElementById('awb').style.backgroundColor = "#ffebee";
        } else {
            document.getElementById('awb').style.borderColor = "var(--border-color)";
            document.getElementById('awb').style.backgroundColor = "#fafafa";
        }
    }

    function logCurrentClaim() {
        const awb = document.getElementById('awb').value;
        const subid = document.getElementById('subid').value;
        
        if (!awb || awb.length < 5) return alert("⚠️ AI Validation: Please enter a valid AWB Number to log the claim.");
        
        if (smartDB.some(item => item.awb === awb)) {
            if(!confirm("⚠️ AI Alert: This AWB is already saved in your database. Log it again anyway?")) return;
        }

        const typeNode = document.querySelector('input[name="returnType"]:checked');
        const type = typeNode ? typeNode.value : "Uncategorized";
        const date = new Date().toLocaleString();

        const claimRecord = { date, awb, subid, type };
        smartDB.push(claimRecord);
        localStorage.setItem('meeshoSmartDB', JSON.stringify(smartDB));
        
        try { let snd = new Audio('https://www.soundjay.com/buttons/button-09.mp3'); snd.play().catch(e=>{}); } catch(e){}
        updateDashboard();
        clearForm(); 
    }

    function updateDashboard() {
        document.getElementById('stat-total').innerText = smartDB.length;
        document.getElementById('stat-rto').innerText = smartDB.filter(i => i.type === 'RTO').length;
        document.getElementById('stat-cr').innerText = smartDB.filter(i => i.type === 'Customer Return').length;

        const container = document.getElementById('history-container');
        if (smartDB.length === 0) {
            container.innerHTML = `<div style="padding: 10px; text-align: center; color: #999;">No claims logged yet.</div>`;
            return;
        }

        container.innerHTML = smartDB.slice().reverse().map(item => `
            <div class="history-item">
                <div><b style="color: #333">${item.awb}</b><br><span style="color:#888; font-size:9px;">${item.date}</span></div>
                <div style="color: var(--meesho-purple); font-weight:bold">${item.type}</div>
            </div>
        `).join('');
    }

    function exportToCSV() {
        if (smartDB.length === 0) return alert("No data to export.");
        let csvContent = "data:text/csv;charset=utf-8,Date,AWB,Sub-Order ID,Return Type\n" 
            + smartDB.map(e => `"${e.date}","${e.awb}","${e.subid}","${e.type}"`).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Claim_Report_v2.6_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function clearDatabase() {
        if(confirm("⚠️ WARNING: Are you sure you want to permanently delete all logged claims from your device?")) {
            smartDB = [];
            localStorage.setItem('meeshoSmartDB', JSON.stringify(smartDB));
            updateDashboard();
            document.getElementById('duplicateWarning').style.display = 'none';
            document.getElementById('awb').style.borderColor = "var(--border-color)";
            document.getElementById('awb').style.backgroundColor = "#fafafa";
        }
    }

    function clearForm() {
        document.getElementById('awb').value = '';
        document.getElementById('subid').value = '';
        document.getElementById('pid').value = '';
        document.getElementById('subid').style.borderColor = "var(--border-color)";
        document.getElementById('subid').style.backgroundColor = "#fafafa";
        document.getElementById('awb').style.borderColor = "var(--border-color)";
        document.getElementById('awb').style.backgroundColor = "#fafafa";
        
        document.getElementById('ticketMessage').value = '';
        document.getElementById('returnReason').selectedIndex = 0;
        document.getElementById('duplicateWarning').style.display = 'none';
        
        closeLiveCamera(); 
        
        const rtoRadio = document.querySelector('input[name="returnType"][value="RTO"]');
        const crRadio = document.querySelector('input[name="returnType"][value="Customer Return"]');
        if(rtoRadio) rtoRadio.checked = false;
        if(crRadio) crRadio.checked = false;
        document.getElementById('reasonContainer').style.display = 'none';
        
        document.getElementById('awb').focus(); 
    }

    function toggleReason() {
        const rtoRadio = document.querySelector('input[name="returnType"][value="RTO"]');
        const reasonContainer = document.getElementById('reasonContainer');
        if (rtoRadio && rtoRadio.checked) {
            reasonContainer.style.display = 'none';
        } else {
            reasonContainer.style.display = 'block';
        }
    }

    function generateTicket() {
        const awb = document.getElementById('awb').value || "[Scan AWB]";
        const subId = document.getElementById('subid').value || "[Scan to Auto-fill]";
        const pid = document.getElementById('pid').value;
        const pidText = pid ? `\nPacket ID: ${pid}` : "";
        
        const typeNode = document.querySelector('input[name="returnType"]:checked');
        const returnType = typeNode ? typeNode.value : null;
        
        let detailedIssue = "";

        if (!returnType) {
            detailedIssue = "Please select 'RTO' or 'Customer Return' to generate the ticket message.";
        } 
        else if (returnType === "RTO") {
            detailedIssue = `Issue: RTO Shipment Problem\n\nDescription:\n1. Packaging standard: The product was dispatched in a high-burst-strength 3-ply corrugated box.\n2. Product Nature: High-grade plastic bangle box.\n3. Evidence: I have received an RTO package, but upon opening it on camera, it was found to be damaged/tampered due to courier mishandling during transit.\n\nRequest: Please review the attached unboxing video and approve this claim under the Seller Protection Fund (SPF) due to clear logistic negligence.`;
        } 
        else if (returnType === "Customer Return") {
            const reasonDrop = document.getElementById('returnReason');
            const reason = reasonDrop.value;

            if (!reason) {
                detailedIssue = "Please select a Customer Return reason from the dropdown.";
            } else {
                switch(reason) {
                    case "I have received damaged return":
                        detailedIssue = `Issue: Received Damaged Return\n\nDescription:\n1. Packaging standard: The product was shipped in a high-burst-strength 3-ply corrugated box (industry standard).\n2. Product Nature: This is a high-grade plastic bangle box.\n3. Evidence of Negligence: The cracks/breaks occurred due to extreme external pressure and courier mishandling during transit, which exceeded the protection of a 3-ply box.\n4. Compliance: I have followed all Meesho packaging guidelines. The unboxing video clearly shows the outer package was damaged/mishandled.\n\nRequest: Please approve this claim under the Seller Protection Fund (SPF) as this is a clear case of courier negligence.`;
                        break;
                    case "I have received wrong return":
                        detailedIssue = `Issue: Received Wrong Return\n\nDescription:\nInstead of the high-grade plastic bangle box that was originally dispatched, I have received a completely different and incorrect item. The attached unboxing video clearly demonstrates the intact return packaging being opened to reveal the fraudulent item inside.\n\nRequest: This is a clear case of fraud. Please investigate and approve my SPF claim.`;
                        break;
                    case "Item/s are missing in my return":
                        detailedIssue = `Issue: Items Missing in Return\n\nDescription:\nThe returned package was received partially empty. Some plastic bangle box units from the original order are missing. The continuous unboxing video clearly shows the sealed package being opened and the exact deficit in contents.\n\nRequest: Please process the SPF claim for the missing units based on the attached video evidence.`;
                        break;
                    case "I have received used product as return":
                        detailedIssue = `Issue: Received Used Product\n\nDescription:\nThe customer has returned a used/degraded item instead of the brand new plastic bangle box that was dispatched. This violates the return policy. The unboxing video is attached for your reference.\n\nRequest: Please approve the SPF claim for this unacceptable customer return.`;
                        break;
                    default:
                        detailedIssue = `Issue: ${reason}\n\nDescription:\nI am raising an issue regarding this order. I have securely packaged the original plastic bangle box following all Meesho guidelines. Please review the specific details in the attached unboxing video/photos which serve as clear evidence of the issue at hand.\n\nRequest: Kindly investigate this matter and process the SPF claim accordingly.`;
                }
            }
        }

        const template = `Dear Meesho Support,\n\nAWB Number: ${awb}\nSub-Order ID: ${subId}${pidText}\n\n${detailedIssue}`;
        document.getElementById('ticketMessage').value = template;
    }
    
    document.getElementById('pid').addEventListener('input', generateTicket);
</script>
</body>
</html>
